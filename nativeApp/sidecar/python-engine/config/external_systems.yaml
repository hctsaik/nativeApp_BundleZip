  #   server_host_name: http://localhost:8765
  #   target_format: xanylabeling
  #   api_token_env: IWSC_TOKEN
  #   connector_type: rest   # optional: rest|file|fake (omit = infer from host scheme).
  #                          # Truly new protocols register a factory via
  #                          # integrations.registry.register_connector(...).
  #   # REST variant? declare endpoints/fields here — no new connector class needed:
  #   rest_mapping:
