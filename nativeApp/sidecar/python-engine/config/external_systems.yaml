# Declarative external-system (tenant) registration (no-code).
# The data-source module (module_026) syncs these into the workspace on load —
# edit this file to add/keep external task systems; no code, no rebuild.
# Tokens are read from the named env var (api_token_env), never stored here.
# Enforced by core/external_systems.py + AnnotationService.sync_external_systems.

systems: []
  # Example (uncomment + fill to register):
