[tool.pytest.ini_options]
markers = ["e2e: browser end-to-end tests (slow, needs chromium)"]
addopts = "-ra"

[tool.black]
line-length = 88
target-version = ["py310"]

[tool.ruff]
line-length = 88
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["retrieval"]
