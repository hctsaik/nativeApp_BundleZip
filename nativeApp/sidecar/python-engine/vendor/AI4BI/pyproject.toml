[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ai4bi"
version = "0.1.0"
description = "AI-for-BI self-service analytics platform"
# Aligned to the CIM Hybrid Edge Platform host interpreter (Python 3.11.9) so the
# app runs in the platform's sidecar without version drift. Dev/test on 3.11.
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "pyarrow>=12.0",
    "duckdb>=0.9",
    "pandas>=2.0",
    "plotly>=5.0",
    "streamlit>=1.35",
    "xlsxwriter>=3.0",
    "matplotlib>=3.7",
    "scipy>=1.10",
    "openpyxl>=3.1",
    "xlrd>=2.0.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov",
]
llm = [
    "anthropic>=0.40",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["ai4bi*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
